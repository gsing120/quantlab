name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest --cov=quantlab --cov-report=term-missing --cov-report=xml
        env:
          QUANTLAB_ENV: development
          POLYGON_API_KEY: dummy_for_ci
          ANTHROPIC_API_KEY: dummy_for_ci
          IBKR_HOST: 127.0.0.1
          IBKR_PORT: 7497
          IBKR_CLIENT_ID: 1
          IBKR_ACCOUNT_ID: DU00000000
          IBKR_MODE: PAPER

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
